name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR thoroughly as a senior Android engineer. Read CLAUDE.md for project conventions before reviewing.

            For every comment, use this format:
            [Severity] [Category] — Description and suggested fix

            Severity levels:
            - 🔴 Critical — Must fix before merge (bugs, crashes, data loss, security)
            - 🟠 Major — Should fix before merge (architecture violations, memory leaks, race conditions)
            - 🟡 Minor — Fix soon but won't block merge (code style, naming, minor inefficiency)
            - 🟢 Suggestion — Nice to have (alternative approaches, optional improvements)

            Review checklist:

            Architecture & Design:
            - SOLID principle violations (especially Single Responsibility and Dependency Inversion)
            - Clean Architecture layer violations (UI referencing data layer directly, etc.)
            - Compliance with CLAUDE.md conventions and existing project patterns

            Android Lifecycle & Memory:
            - Activity/Fragment leaks from coroutine launches without proper scope
            - Unsafe operations in wrong lifecycle state
            - Missing lifecycle-aware collection of Flows in UI
            - ViewModels holding references to Context or Views

            Kotlin Coroutines & Flows:
            - Correct dispatcher usage (IO for network/database, Main for UI)
            - Flow collection safety (using repeatOnLifecycle or collectAsStateWithLifecycle)
            - Missing cancellation handling
            - SharedFlow/StateFlow misuse (replay, buffer overflow strategy)
            - Potential race conditions in concurrent coroutine launches

            Jetpack Compose:
            - Unnecessary recompositions (unstable parameters, missing remember/derivedStateOf)
            - Proper state hoisting (stateless composables)
            - Side effect handling (LaunchedEffect, DisposableEffect usage)
            - Missing previews for new composables

            Data & Persistence:
            - Room database migration correctness
            - Missing error handling on database/network operations
            - Proper use of Flow for reactive data observation

            Testing:
            - Missing unit tests for new ViewModels, UseCases, or Repositories
            - Test naming follows project convention
            - Edge cases and error scenarios covered

            Post inline comments on the specific lines where issues are found.
            Be constructive — always suggest the fix, not just the problem.
            At the end, post a summary comment with counts per severity level.
